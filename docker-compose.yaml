x-environment: &environment
  env_file:
    - path: ./.env.example
      required: true
    - path: ./.env
      required: false

services:
  forum:
    <<: *environment
    # image: ghcr.io/xxx/yyy:${BUILD_VERSION:-1.0.0}
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: ${APP_ENV:-dev}
      args:
        BUILD_FPM_VERSION: ${BUILD_FPM_VERSION:-7.4-fpm}
    container_name: forum
    restart: on-failure
    ports:
      - "${BUILD_FPM_PUBLIC_PORT:-9000}:9000"
    volumes:
      - composer:/home/sources/.composer:rw
      - ./:/home/sources/forum.sources.ru:rw
    profiles:
      - ''
      - backend
      - build
      - forum
    networks:
      - forum
      #- database

  server:
    <<: *environment
    build:
      context: .
      dockerfile: docker/angie/Dockerfile
      args:
        BUILD_SERVER_VERSION: ${BUILD_SERVER_VERSION:-1.10.3-minimal}
    container_name: server
    volumes:
      - ./:/home/sources/forum.sources.ru:ro
    ports:
      - "${BUILD_SERVER_HTTP_PUBLIC_PORT:-80}:80"
      - "${BUILD_SERVER_HTTPS_PUBLIC_PORT:-443}:443"
    profiles:
      - ''
      - backend
      - infrastructure
    networks:
      - forum

networks:
  forum:
    name: forum.sources.ru
    driver: bridge
  # database:
  #   external: false

volumes:
  composer:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "uid=${UID:-1000}"
